om name for the primary index.\nnum_replicas\nNumber of index replicas.\ndeferred\nWhen true, create the index in deferred state (must be built later).\nignore_if_exists\nWhen true, do not error if the index already exists.\ncouchbase\nadmin\nquery\nv1\nCreatePrimaryIndexResponse\ncouchbase\nadmin\nquery\nv1\nDropIndexRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nname\n\nignore_if_missing\nWhen true, do not error if the index does not exist.\ncouchbase\nadmin\nquery\nv1\nDropIndexResponse\ncouchbase\nadmin\nquery\nv1\nDropPrimaryIndexRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nname\n\nignore_if_missing\nWhen true, do not error if the index does not exist.\ncouchbase\nadmin\nquery\nv1\nDropPrimaryIndexResponse\ncouchbase\nadmin\nquery\nv1\nGetAllIndexesRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\ncouchbase\nadmin\nquery\nv1\nGetAllIndexesResponse\nindexes\n\ncouchbase\nadmin\nquery\nv1\nGetAllIndexesResponse\nIndex\nbucket_name\n\nscope_name\n\ncollection_name\n\nname\n\nis_primary\n\ntype\n\nstate\n\nfields\nThe indexed field expressions.\ncondition\nThe WHERE clause condition, if any.\npartition\nThe PARTITION BY expression, if any.\ncouchbase\nadmin\nquery\nv1\nBuildDeferredIndexesResponse\nIndex\nbucket_name\n\nscope_name\n\ncollection_name\n\nname\n\ncouchbase\nadmin\nquery\nv1\nWaitForIndexOnlineRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nname\n\ncouchbase\nadmin\nquery\nv1\nWaitForIndexOnlineResponse\ncouchbase\nadmin\nquery\nv1\nIndexState\nIndexState represents the current lifecycle state of an index.\nINDEX_STATE_DEFERRED\nThe index was created with deferred=true and has not been built yet.\nINDEX_STATE_BUILDING\nThe index is currently being built.\nINDEX_STATE_PENDING\nThe index build is pending (queued).\nINDEX_STATE_ONLINE\nThe index is online and ready for queries.\nINDEX_STATE_OFFLINE\nThe index is offline.\nINDEX_STATE_ABRIDGED\nThe index is in an abridged state.\nINDEX_STATE_SCHEDULED\nThe index build is scheduled but not yet started.\ncouchbase\nadmin\nquery\nv1\nIndexType\nIndexType specifies the underlying index technology.\nINDEX_TYPE_VIEW\nA MapReduce view-based index.\nINDEX_TYPE_GSI\nA Global Secondary Index (GSI).\n"}, "couchbase.admin.search.v1": {"package": "couchbase.admin.search.v1", "url": "couchbase.admin.search.v1.html", "content": "couchbase.admin.search.v1\n\ncouchbase\nadmin\nsearch\nv1\nSearchAdminService\nSearchAdminService provides search index management and control.\nGetIndex\nGetIndex retrieves a single search index by name.\ncouchbase\nadmin\nsearch\nv1\nGetIndexRequest\ncouchbase\nadmin\nsearch\nv1\nGetIndexResponse\nListIndexes\nListIndexes returns all search indexes, optionally scoped.\ncouchbase\nadmin\nsearch\nv1\nListIndexesRequest\ncouchbase\nadmin\nsearch\nv1\nListIndexesResponse\nCreateIndex\nCreateIndex creates a new search index.\ncouchbase\nadmin\nsearch\nv1\nCreateIndexRequest\ncouchbase\nadmin\nsearch\nv1\nCreateIndexResponse\nUpdateIndex\nUpdateIndex updates an existing search index definition.\ncouchbase\nadmin\nsearch\nv1\nUpdateIndexRequest\ncouchbase\nadmin\nsearch\nv1\nUpdateIndexResponse\nDeleteIndex\nDeleteIndex deletes a search index.\ncouchbase\nadmin\nsearch\nv1\nDeleteIndexRequest\ncouchbase\nadmin\nsearch\nv1\nDeleteIndexResponse\nAnalyzeDocument\nAnalyzeDocument analyzes a document against an index definition,\n returning the tokens that would be indexed.\ncouchbase\nadmin\nsearch\nv1\nAnalyzeDocumentRequest\ncouchbase\nadmin\nsearch\nv1\nAnalyzeDocumentResponse\nGetIndexedDocumentsCount\nGetIndexedDocumentsCount returns the number of documents indexed\n by a specific search index.\ncouchbase\nadmin\nsearch\nv1\nGetIndexedDocumentsCountRequest\ncouchbase\nadmin\nsearch\nv1\nGetIndexedDocumentsCountResponse\nPauseIndexIngest\nPauseIndexIngest pauses document ingestion for an index.\ncouchbase\nadmin\nsearch\nv1\nPauseIndexIngestRequest\ncouchbase\nadmin\nsearch\nv1\nPauseIndexIngestResponse\nResumeIndexIngest\nResumeIndexIngest resumes document ingestion for a paused index.\ncouchbase\nadmin\nsearch\nv1\nResumeIndexIngestRequest\ncouchbase\nadmin\nsearch\nv1\nResumeIndexIngestResponse\nAllowIndexQuerying\nAllowIndexQuerying allows queries against an index.\ncouchbase\nadmin\nsearch\nv1\nAllowIndexQueryingRequest\ncouchbase\nadmin\nsearch\nv1\nAllowIndexQueryingResponse\nDisallowIndexQuerying\nDisallowIndexQuerying prevents queries against an index.\ncouchbase\nadmin\nsearch\nv1\nDisallowIndexQueryingRequest\ncouchbase\nadmin\nsearch\nv1\nDisallowIndexQueryingResponse\nFreezeIndexPlan\nFreezeIndexPlan prevents the index plan from being reassigned.\ncouchbase\nadmin\nsearch\nv1\nFreezeIndexPlanRequest\ncouchbase\nadmin\nsearch\nv1\nFreezeIndexPlanResponse\nUnfreezeIndexPlan\nUnfreezeIndexPlan allows the index plan to be reassigned.\ncouchbase\nadmin\nsearch\nv1\nUnfreezeIndexPlanRequest\ncouchbase\nadmin\nsearch\nv1\nUnfreezeIndexPlanResponse\ncouchbase\nadmin\nsearch\nv1\nAllowIndexQueryingRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nAllowIndexQueryingResponse\ncouchbase\nadmin\nsearch\nv1\nAnalyzeDocumentRequest\nname\nThe index name to analyze against.\ndoc\nThe document to analyze. JSON-encoded.\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nAnalyzeDocumentResponse\nstatus\nStatus of the analysis operation.\nanalyzed\nThe analysis results (tokens, etc.). JSON-encoded.\ncouchbase\nadmin\nsearch\nv1\nCreateIndexRequest\nname\n\nparams\n\nplan_params\n\nprev_index_uuid\nUUID of a prior index version, for optimistic concurrency.\nsource_name\n\nsource_params\n\nsource_type\n\nsource_uuid\n\ntype\n\nbucket_name\nOptional bucket/scope scoping for the index.\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nCreateIndexResponse\ncouchbase\nadmin\nsearch\nv1\nDeleteIndexRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nDeleteIndexResponse\ncouchbase\nadmin\nsearch\nv1\nDisallowIndexQueryingRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nDisallowIndexQueryingResponse\ncouchbase\nadmin\nsearch\nv1\nFreezeIndexPlanRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nFreezeIndexPlanResponse\ncouchbase\nadmin\nsearch\nv1\nGetIndexRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nGetIndexResponse\nindex\n\ncouchbase\nadmin\nsearch\nv1\nGetIndexedDocumentsCountRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nGetIndexedDocumentsCountResponse\ncount\n\ncouchbase\nadmin\nsearch\nv1\nIndex\nname\nThe name of the index.\nparams\nIndex parameters (type mappings, analyzers, etc.). Values are JSON-encoded.\nplan_params\nPlan parameters (num_replicas, partition settings). Values are\n JSON-encoded.\nsource_name\nThe data source name (typically the bucket name).\nsource_params\nSource-specific parameters. Values are JSON-encoded.\nsource_type\nThe type of data source (e.g., \"couchbase\").\nsource_uuid\nThe UUID of the source.\ntype\nThe index type (e.g., \"fulltext-index\").\nuuid\nThe unique identifier for this index.\ncouchbase\nadmin\nsearch\nv1\nListIndexesRequest\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nListIndexesResponse\nindexes\n\ncouchbase\nadmin\nsearch\nv1\nIndex\nParamsEntry\nkey\n\nvalue\n\ncouchbase\nadmin\nsearch\nv1\nCreateIndexRequest\nParamsEntry\nkey\n\nvalue\n\ncouchbase\nadmin\nsearch\nv1\nPauseIndexIngestRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nPauseIndexIngestResponse\ncouchbase\nadmin\nsearch\nv1\nIndex\nPlanParamsEntry\nkey\n\nvalue\n\ncouchbase\nadmin\nsearch\nv1\nCreateIndexRequest\nPlanParamsEntry\nkey\n\nvalue\n\ncouchbase\nadmin\nsearch\nv1\nResumeIndexIngestRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nResumeIndexIngestResponse\ncouchbase\nadmin\nsearch\nv1\nIndex\nSourceParamsEntry\nkey\n\nvalue\n\ncouchbase\nadmin\nsearch\nv1\nCreateIndexRequest\nSourceParamsEntry\nkey\n\nvalue\n\ncouchbase\nadmin\nsearch\nv1\nUnfreezeIndexPlanRequest\nname\n\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nUnfreezeIndexPlanResponse\ncouchbase\nadmin\nsearch\nv1\nUpdateIndexRequest\nindex\nThe full index definition with updated fields.\nbucket_name\n\nscope_name\n\ncouchbase\nadmin\nsearch\nv1\nUpdateIndexResponse\n"}, "couchbase.analytics.v1": {"package": "couchbase.analytics.v1", "url": "couchbase.analytics.v1.html", "content": "couchbase.analytics.v1\n\ncouchbase\nanalytics\nv1\nAnalyticsService\nAnalyticsService provides SQL++ analytics query execution.\nAnalyticsQuery\nAnalyticsQuery executes an analytics statement and streams back result\n rows and metadata. The final streamed response contains MetaData.\ncouchbase\nanalytics\nv1\nAnalyticsQueryRequest\ncouchbase\nanalytics\nv1\nAnalyticsQueryResponse\ncouchbase\nanalytics\nv1\nAnalyticsQueryRequest\nstatement\nThe SQL++ analytics statement to execute.\nread_only\nWhen true, the query is read-only and will not modify any data.\nclient_context_id\nAn opaque identifier for client-side request correlation.\npriority\nWhen true, this query receives priority scheduling on the analytics node.\nscan_consistency\n\npositional_parameters\nPositional parameters ($1, $2, etc.). Each element is JSON-encoded.\nnamed_parameters\nNamed parameters ($name). Keys are parameter names, values are\n JSON-encoded.\nanalytics_scope_name\nThe analytics scope to execute the query against.\nplan_format\n\ninclude_logical_plan\nWhen true, include the logical plan in the response metadata.\ninclude_organized_logical_plan\nWhen true, include the organized (optimized) logical plan.\ninclude_expression_tree\nWhen true, include the expression tree in the response metadata.\ninclude_rewritten_expression_tree\nWhen true, include the rewritten expression tree.\nmax_warnings\nMaximum number of warnings to include in the response.\ncouchbase\nanalytics\nv1\nAnalyticsQueryResponse\nrows\nResult rows, each as a JSON-encoded byte array.\nmeta_data\n\ncouchbase\nanalytics\nv1\nAnalyticsQueryResponse\nMetaData\nrequest_id\nThe unique identifier assigned to this query by the server.\nclient_context_id\nThe client_context_id echoed back from the request.\nmetrics\nExecution metrics for this query.\nsignature\nThe schema signature of the results. JSON-encoded.\nwarnings\nWarnings encountered during execution.\nstatus\nThe analytics execution status string.\nlogical_plan\nThe logical plan, if requested. JSON-encoded.\noptimized_logical_plan\nThe optimized logical plan, if requested. JSON-encoded.\nexpression_tree\nThe expression tree, if requested.\nrewritten_expression_tree\nThe rewritten expression tree, if requested.\ncouchbase\nanalytics\nv1\nAnalyticsQueryResponse\nMetrics\nelapsed_time\nTotal wall-clock time for the query.\nexecution_time\nTime spent executing (excludes queue wait).\nresult_count\nNumber of result rows returned.\nresult_size\nTotal size of result rows in bytes.\nmutation_count\nNumber of mutations performed.\nsort_count\nNumber of items sorted.\nerror_count\nNumber of errors encountered.\nwarning_count\nNumber of warnings encountered.\nprocessed_objects\nNumber of objects processed by the analytics engine.\ncouchbase\nanalytics\nv1\nAnalyticsQueryRequest\nNamedParametersEntry\nkey\n\nvalue\n\ncouchbase\nanalytics\nv1\nAnalyticsQueryResponse\nMetaData\nWarning\ncode\n\nmessage\n\ncouchbase\nanalytics\nv1\nAnalyticsQueryRequest\nPlanFormat\nPlanFormat controls the output format for query execution plans.\nPLAN_FORMAT_JSON\nReturn the plan as a JSON object.\nPLAN_FORMAT_STRING\nReturn the plan as a human-readable string.\ncouchbase\nanalytics\nv1\nAnalyticsQueryRequest\nScanConsistency\nScanConsistency controls data consistency for the analytics query.\nSCAN_CONSISTENCY_NOT_BOUNDED\nNo consistency required \u2014 may return stale results.\nSCAN_CONSISTENCY_REQUEST_PLUS\nWait for all prior mutations to be ingested before executing.\n"}, "couchbase.kv.v1": {"package": "couchbase.kv.v1", "url": "couchbase.kv.v1.html", "content": "couchbase.kv.v1\n\ncouchbase\nkv\nv1\nKvService\nKvService provides key-value document operations against a Couchbase cluster.\n Operations are organized into reads, mutations, counters, binary operations,\n sub-document operations, and replica reads.\nGet\nGet retrieves a document by key. Supports field-level projection via the\n `project` field and optional compressed responses.\ncouchbase\nkv\nv1\nGetRequest\ncouchbase\nkv\nv1\nGetResponse\nGetAndTouch\nGetAndTouch retrieves a document and simultaneously resets its expiry.\ncouchbase\nkv\nv1\nGetAndTouchRequest\ncouchbase\nkv\nv1\nGetAndTouchResponse\nGetAndLock\nGetAndLock retrieves a document and acquires a pessimistic lock for the\n specified duration. The lock must be released via Unlock or will\n auto-expire after lock_time_secs.\ncouchbase\nkv\nv1\nGetAndLockRequest\ncouchbase\nkv\nv1\nGetAndLockResponse\nUnlock\nUnlock releases a pessimistic lock previously acquired by GetAndLock.\n Requires the CAS value returned by the locking operation.\ncouchbase\nkv\nv1\nUnlockRequest\ncouchbase\nkv\nv1\nUnlockResponse\nTouch\nTouch resets a document's expiry without retrieving its content.\ncouchbase\nkv\nv1\nTouchRequest\ncouchbase\nkv\nv1\nTouchResponse\nExists\nExists checks whether a document exists without retrieving its content.\n Returns a boolean result and the current CAS.\ncouchbase\nkv\nv1\nExistsRequest\ncouchbase\nkv\nv1\nExistsResponse\nInsert\nInsert creates a new document. Fails if the document already exists.\n Supports durability requirements.\ncouchbase\nkv\nv1\nInsertRequest\ncouchbase\nkv\nv1\nInsertResponse\nUpsert\nUpsert creates or replaces a document unconditionally.\n Supports preserving the existing expiry on update.\ncouchbase\nkv\nv1\nUpsertRequest\ncouchbase\nkv\nv1\nUpsertResponse\nReplace\nReplace updates an existing document. Fails if the document does not exist.\n Supports optimistic locking via optional CAS.\ncouchbase\nkv\nv1\nReplaceRequest\ncouchbase\nkv\nv1\nReplaceResponse\nRemove\nRemove deletes a document. Supports optimistic locking via optional CAS\n and durability requirements.\ncouchbase\nkv\nv1\nRemoveRequest\ncouchbase\nkv\nv1\nRemoveResponse\nIncrement\nIncrement atomically increments a counter document by the specified delta.\n If the document does not exist and an initial value is provided, it is\n created with that value.\ncouchbase\nkv\nv1\nIncrementRequest\ncouchbase\nkv\nv1\nIncrementResponse\nDecrement\nDecrement atomically decrements a counter document by the specified delta.\n If the document does not exist and an initial value is provided, it is\n created with that value.\ncouchbase\nkv\nv1\nDecrementRequest\ncouchbase\nkv\nv1\nDecrementResponse\nAppend\nAppend appends raw bytes to the end of an existing document's value.\ncouchbase\nkv\nv1\nAppendRequest\ncouchbase\nkv\nv1\nAppendResponse\nPrepend\nPrepend prepends raw bytes to the beginning of an existing document's\n value.\ncouchbase\nkv\nv1\nPrependRequest\ncouchbase\nkv\nv1\nPrependResponse\nLookupIn\nLookupIn performs one or more sub-document lookup operations (get, exists,\n count) on paths within a JSON document. Supports xattr and access_deleted\n flags.\ncouchbase\nkv\nv1\nLookupInRequest\ncouchbase\nkv\nv1\nLookupInResponse\nMutateIn\nMutateIn performs one or more sub-document mutation operations on paths\n within a JSON document. Supports insert, upsert, replace, remove, array\n operations, and counters at the sub-document level.\ncouchbase\nkv\nv1\nMutateInRequest\ncouchbase\nkv\nv1\nMutateInResponse\nGetAllReplicas\nGetAllReplicas returns the document from the active node and all replica\n nodes as a server-streamed response. Each response indicates whether it\n is from a replica via the is_replica flag.\ncouchbase\nkv\nv1\nGetAllReplicasRequest\ncouchbase\nkv\nv1\nGetAllReplicasResponse\ncouchbase\nkv\nv1\nAppendRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncontent\nThe bytes to append to the existing document value.\ncas\nOptional CAS for optimistic concurrency.\ndurability_level\n\ncouchbase\nkv\nv1\nAppendResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nDecrementRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ndelta\nThe amount to decrement the counter by.\nexpiry_time\n\ninitial\nIf the counter document does not exist, it will be created with this\n initial value.\ndurability_level\n\nexpiry_secs\n\ncouchbase\nkv\nv1\nDecrementResponse\ncas\n\ncontent\nThe counter value after the decrement operation.\nmutation_token\n\ncouchbase\nkv\nv1\nExistsRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncouchbase\nkv\nv1\nExistsResponse\nresult\nTrue if the document exists.\ncas\nThe current CAS value of the document, if it exists.\ncouchbase\nkv\nv1\nLookupInRequest\nSpec\nFlags\nxattr\nWhen true, operate on an extended attribute (xattr) rather\n than the document body.\ncouchbase\nkv\nv1\nLookupInRequest\nFlags\naccess_deleted\nWhen true, allow lookups on deleted (tombstoned) documents.\ncouchbase\nkv\nv1\nMutateInRequest\nSpec\nFlags\ncreate_path\nWhen true, intermediate path elements are created if they don't exist.\nxattr\nWhen true, operate on an extended attribute (xattr).\ncouchbase\nkv\nv1\nMutateInRequest\nFlags\naccess_deleted\nWhen true, allow mutations on deleted (tombstoned) documents.\ncouchbase\nkv\nv1\nGetAllReplicasRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncouchbase\nkv\nv1\nGetAllReplicasResponse\nis_replica\nTrue if this response came from a replica node, false if from the active.\ncontent\n\ncontent_flags\n\ncas\n\ncouchbase\nkv\nv1\nGetAndLockRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\nlock_time_secs\nDuration in seconds for the pessimistic lock. The lock auto-expires\n after this period if not explicitly released via Unlock.\ncompression\n\ncouchbase\nkv\nv1\nGetAndLockResponse\ncontent_uncompressed\n\ncas\nThe CAS value required to unlock or mutate the locked document.\nexpiry\n\ncontent_flags\n\ncontent_compressed\n\ncouchbase\nkv\nv1\nGetAndTouchRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\nexpiry_time\n\nexpiry_secs\n\ncompression\n\ncouchbase\nkv\nv1\nGetAndTouchResponse\ncontent_uncompressed\n\ncas\n\nexpiry\n\ncontent_flags\n\ncontent_compressed\n\ncouchbase\nkv\nv1\nGetRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\nproject\nOptional list of JSON field paths to project. When specified, only\n the requested fields are returned instead of the full document.\ncompression\nControls whether compressed content may be returned.\ncouchbase\nkv\nv1\nGetResponse\ncontent_uncompressed\n\ncas\nThe current Compare-And-Swap value for optimistic concurrency.\nexpiry\nThe document's expiry time, if set.\ncontent_flags\nSDK-specific flags describing the content encoding/type.\ncontent_compressed\n\ncouchbase\nkv\nv1\nIncrementRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ndelta\nThe amount to increment the counter by.\nexpiry_time\n\ninitial\nIf the counter document does not exist, it will be created with this\n initial value. If not provided and the document doesn't exist, the\n operation will fail.\ndurability_level\n\nexpiry_secs\n\ncouchbase\nkv\nv1\nIncrementResponse\ncas\n\ncontent\nThe counter value after the increment operation.\nmutation_token\n\ncouchbase\nkv\nv1\nInsertRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncontent_uncompressed\n\nexpiry_time\n\ndurability_level\nOptional durability requirements for this mutation.\nexpiry_secs\n\ncontent_flags\nSDK-specific flags describing the content encoding/type.\ncontent_compressed\n\ncouchbase\nkv\nv1\nInsertResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nLegacyDurabilitySpec\nnum_replicated\nNumber of replica nodes that must acknowledge the mutation.\nnum_persisted\nNumber of nodes (active + replicas) that must persist the mutation to disk.\ncouchbase\nkv\nv1\nLookupInRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\nspecs\nThe list of sub-document lookup operations to perform.\nflags\n\ncouchbase\nkv\nv1\nLookupInResponse\nspecs\nResults corresponding 1:1 to the specs in the request.\ncas\nThe document's CAS at the time of the lookup.\ncouchbase\nkv\nv1\nMutateInRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\nspecs\nThe list of sub-document mutations to perform atomically.\nstore_semantic\n\ndurability_level\n\ncas\nOptional CAS for optimistic concurrency on the full document.\nflags\n\nexpiry_time\n\nexpiry_secs\n\ncouchbase\nkv\nv1\nMutateInResponse\nspecs\nResults corresponding 1:1 to the specs in the request.\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nMutationToken\nbucket_name\nThe bucket in which the mutation occurred.\nvbucket_id\nThe vbucket where the mutation was applied.\nvbucket_uuid\nThe UUID of the vbucket at the time of mutation.\nseq_no\nThe sequence number assigned to the mutation.\ncouchbase\nkv\nv1\nPrependRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncontent\nThe bytes to prepend to the existing document value.\ncas\nOptional CAS for optimistic concurrency.\ndurability_level\n\ncouchbase\nkv\nv1\nPrependResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nRemoveRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncas\nOptional CAS for optimistic concurrency control.\ndurability_level\n\ncouchbase\nkv\nv1\nRemoveResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nReplaceRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncontent_uncompressed\n\ncas\nOptional CAS for optimistic concurrency. If provided, the replace\n will fail if the document has been modified since this CAS was obtained.\nexpiry_time\n\ndurability_level\n\nexpiry_secs\n\ncontent_flags\n\ncontent_compressed\n\ncouchbase\nkv\nv1\nReplaceResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nLookupInRequest\nSpec\noperation\n\npath\nThe JSON path to operate on (e.g., \"address.city\" or \"tags[0]\").\nflags\n\ncouchbase\nkv\nv1\nLookupInResponse\nSpec\nstatus\nThe status of this individual lookup operation. A non-OK status\n indicates the path was not found or another path-level error.\ncontent\nThe content retrieved from the path, if the operation succeeded.\ncouchbase\nkv\nv1\nMutateInRequest\nSpec\noperation\n\npath\nThe JSON path to operate on.\ncontent\nThe value to apply (interpretation depends on the operation).\nflags\n\ncouchbase\nkv\nv1\nMutateInResponse\nSpec\ncontent\n\ncouchbase\nkv\nv1\nTouchRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\nexpiry_time\n\nexpiry_secs\n\ncouchbase\nkv\nv1\nTouchResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nUnlockRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncas\nThe CAS value returned by the GetAndLock that acquired the lock.\ncouchbase\nkv\nv1\nUnlockResponse\ncouchbase\nkv\nv1\nUpsertRequest\nbucket_name\n\nscope_name\n\ncollection_name\n\nkey\n\ncontent_uncompressed\n\nexpiry_time\n\ndurability_level\n\nexpiry_secs\n\ncontent_flags\n\npreserve_expiry_on_existing\nWhen true and the document already exists, the existing expiry is\n preserved rather than being replaced by the new expiry value.\ncontent_compressed\n\ncouchbase\nkv\nv1\nUpsertResponse\ncas\n\nmutation_token\n\ncouchbase\nkv\nv1\nCompressionEnabled\nCompressionEnabled controls whether the server may return compressed content.\nCOMPRESSION_ENABLED_OPTIONAL\nThe server may return either compressed or uncompressed content.\nCOMPRESSION_ENABLED_ALWAYS\nThe server should always return compressed content when possible.\ncouchbase\nkv\nv1\nDurabilityLevel\nDurabilityLevel specifies the durability requirements for mutation\n operations. Controls how many nodes must acknowledge a write before it is\n considered successful.\nDURABILITY_LEVEL_MAJORITY\nThe mutation must be replicated to a majority of data service nodes.\nDURABILITY_LEVEL_MAJORITY_AND_PERSIST_TO_ACTIVE\nThe mutation must be replicated to a majority of nodes and additionally\n persisted to disk on the active node.\nDURABILITY_LEVEL_PERSIST_TO_MAJORITY\nThe mutation must be persisted to disk on a majority of data service nodes.\ncouchbase\nkv\nv1\nLookupInRequest\nSpec\nOperation\nThe type of sub-document lookup to perform.\nOPERATION_GET\nRetrieve the value at the specified path.\nOPERATION_EXISTS\nCheck whether a value exists at the specified path.\nOPERATION_COUNT\nCount the number of elements in an array or keys in an object\n at the specified path.\ncouchbase\nkv\nv1\nMutateInRequest\nSpec\nOperation\nThe type of sub-document mutation to perform.\nOPERATION_INSERT\nInsert a value at the specified path (fails if path exists).\nOPERATION_UPSERT\nInsert or replace a value at the specified path.\nOPERATION_REPLACE\nReplace a value at the specified path (fails if path doesn't exist).\nOPERATION_REMOVE\nRemove the value at the specified path.\nOPERATION_ARRAY_APPEND\nAppend a value to the end of an array.\nOPERATION_ARRAY_PREPEND\nPrepend a value to the beginning of an array.\nOPERATION_ARRAY_INSERT\nInsert a value at a specific index in an array.\nOPERATION_ARRAY_ADD_UNIQUE\nAdd a value to an array only if it doesn't already exist.\nOPERATION_COUNTER\nIncrement or decrement a numeric value at the specified path.\ncouchbase\nkv\nv1\nMutateInRequest\nStoreSemantic\nStoreSemantic controls the document-level behavior of the mutation.\nSTORE_SEMANTIC_REPLACE\nThe document must already exist (default).\nSTORE_SEMANTIC_UPSERT\nCreate the document if it doesn't exist, or update if it does.\nSTORE_SEMANTIC_INSERT\nCreate the document only if it doesn't exist (fail otherwise).\n"}, "couchbase.query.v1": {"package": "couchbase.query.v1", "url": "couchbase.query.v1.html", "content": "couchbase.query.v1\n\ncouchbase\nquery\nv1\nQueryService\nQueryService provides N1QL (SQL++) query execution.\nQuery\nQuery executes a N1QL statement and streams back result rows and metadata.\n Results are delivered incrementally \u2014 rows arrive first, followed by a\n final response containing MetaData (status, metrics, warnings).\ncouchbase\nquery\nv1\nQueryRequest\ncouchbase\nquery\nv1\nQueryResponse\ncouchbase\nquery\nv1\nQueryResponse\nMetaData\nrequest_id\nThe unique identifier assigned to this query by the server.\nclient_context_id\nThe client_context_id echoed back from the request.\nmetrics\n\nstatus\n\nwarnings\n\nprofile\nProfiling information, when requested via profile_mode. JSON-encoded.\nsignature\nThe schema signature of the results. JSON-encoded.\ncouchbase\nquery\nv1\nQueryResponse\nMetaData\nMetrics\nelapsed_time\nTotal wall-clock time for the query.\nexecution_time\nTime spent executing the query (excludes queue wait).\nresult_count\nNumber of result rows returned.\nresult_size\nTotal size of all result rows in bytes.\nmutation_count\nNumber of mutations performed by the query.\nsort_count\nNumber of items sorted during query execution.\nerror_count\nNumber of errors encountered.\nwarning_count\nNumber of warnings encountered.\ncouchbase\nquery\nv1\nQueryRequest\nNamedParametersEntry\nkey\n\nvalue\n\ncouchbase\nquery\nv1\nQueryRequest\nbucket_name\nThe bucket to scope the query to. Optional for cluster-level queries.\nscope_name\nThe scope within the bucket. Only meaningful when bucket_name is set.\nstatement\nThe N1QL (SQL++) statement to execute.\nread_only\nWhen true, the query is read-only and will not modify any data.\nprepared\nWhen true, the query engine uses a prepared (cached) form of the statement.\ntuning_options\n\nclient_context_id\nAn opaque identifier for this request, echoed back in the response\n for client-side correlation.\nscan_consistency\n\npositional_parameters\nPositional parameters for parameterized queries ($1, $2, etc.).\n Each element is a JSON-encoded value.\nnamed_parameters\nNamed parameters for parameterized queries ($name).\n Keys are parameter names, values are JSON-encoded.\nflex_index\nWhen true, use a flex index (full-text search index) for the query.\npreserve_expiry\nWhen true, preserve document expiry on mutations performed by this query.\nconsistent_with\nMutation tokens from prior KV operations. Provides at_plus (read-your-\n own-writes) consistency \u2014 the query will wait until these mutations\n are indexed.\nprofile_mode\n\ndurability_level\n\ncouchbase\nquery\nv1\nQueryResponse\nrows\nResult rows, each as a JSON-encoded byte array.\nmeta_data\n\ncouchbase\nquery\nv1\nQueryRequest\nTuningOptions\nmax_parallelism\nMaximum number of index partitions to scan in parallel.\npipeline_batch\nNumber of items in a batch for query pipeline processing.\npipeline_cap\nMaximum number of items in the query pipeline queue.\nscan_wait\nMaximum time to wait for index consistency (for scan_consistency).\nscan_cap\nMaximum number of index entries to scan per partition.\ndisable_metrics\nWhen true, metrics are not collected for this query.\ncouchbase\nquery\nv1\nQueryResponse\nMetaData\nWarning\ncode\nThe warning code.\nmessage\nA human-readable description of the warning.\ncouchbase\nquery\nv1\nQueryRequest\nDurabilityLevel\nDurabilityLevel for mutations performed by this query.\nDURABILITY_LEVEL_NONE\nNo durability requirements (default).\nDURABILITY_LEVEL_MAJORITY\nReplicate to a majority of data service nodes.\nDURABILITY_LEVEL_MAJORITY_AND_PERSIST_TO_ACTIVE\nReplicate to majority and persist to the active node.\nDURABILITY_LEVEL_PERSIST_TO_MAJORITY\nPersist to a majority of data service nodes.\ncouchbase\nquery\nv1\nQueryRequest\nProfileMode\nProfileMode controls the level of query profiling information returned.\nPROFILE_MODE_OFF\nNo profiling.\nPROFILE_MODE_PHASES\nProfile execution phases.\nPROFILE_MODE_TIMINGS\nProfile individual operator timings.\ncouchbase\nquery\nv1\nQueryRequest\nScanConsistency\nScanConsistency controls index consistency guarantees.\nSCAN_CONSISTENCY_NOT_BOUNDED\nNo consistency required \u2014 fastest, but may return stale results.\nSCAN_CONSISTENCY_REQUEST_PLUS\nWait for all prior mutations to be indexed before executing.\ncouchbase\nquery\nv1\nQueryResponse\nMetaData\nStatus\nStatus indicates the overall outcome of the query.\nSTATUS_RUNNING\n\nSTATUS_SUCCESS\n\nSTATUS_ERRORS\n\nSTATUS_COMPLETED\n\nSTATUS_STOPPED\n\nSTATUS_TIMEOUT\n\nSTATUS_CLOSED\n\nSTATUS_FATAL\n\nSTATUS_ABORTED\n\nSTATUS_UNKNOWN\n\n"}, "couchbase.routing.v2": {"package": "couchbase.routing.v2", "url": "couchbase.routing.v2.html", "content": "couchbase.routing.v2\n\ncouchbase\nrouting\nv2\nRoutingService\nRoutingService provides cluster topology updates as a server-streamed\n response. The stream emits a new WatchRoutingResponse whenever the\n cluster topology changes.\nWatchRouting\nWatchRouting opens a long-lived stream that delivers routing\n configuration updates. If bucket_name is specified, the response\n includes vbucket routing for that specific bucket.\ncouchbase\nrouting\nv2\nWatchRoutingRequest\ncouchbase\nrouting\nv2\nWatchRoutingResponse\ncouchbase\nrouting\nv2\nServerRouting\nnum_local_servers\nNumber of servers in the local (same-datacenter) group.\nnum_group_servers\nNumber of servers in the remote (other-datacenter) group.\ncouchbase\nrouting\nv2\nVbucketRouting\nnum_vbuckets\nTotal number of vbuckets for this bucket.\nlocal_vbuckets\nMapping of vbucket IDs to local server indices.\ngroup_vbuckets\nMapping of vbucket IDs to group (remote) server indices.\ncouchbase\nrouting\nv2\nWatchRoutingRequest\nbucket_name\nWhen specified, include vbucket routing data for this bucket.\n When omitted, only service-level routing is returned.\ncouchbase\nrouting\nv2\nWatchRoutingResponse\nserver_routing\nRouting for the KV (data) service.\nviews_routing\nRouting for the Views service.\nquery_routing\nRouting for the Query (N1QL) service.\nsearch_routing\nRouting for the Search (FTS) service.\nanalytics_routing\nRouting for the Analytics (CBAS) service.\nvbucket_data_routing\nVbucket distribution for the KV data service. Only present when\n a bucket_name was specified in the request.\n"}, "couchbase.search.v1": {"package": "couchbase.search.v1", "url": "couchbase.search.v1.html", "content": "couchbase.search.v1\n\ncouchbase\nsearch\nv1\nSearchService\nSearchService provides full-text search query execution.\nSearchQuery\nSearchQuery executes a search query against a named index and streams\n back hits, facet results, and metadata.\ncouchbase\nsearch\nv1\nSearchQueryRequest\ncouchbase\nsearch\nv1\nSearchQueryResponse\ncouchbase\nsearch\nv1\nBooleanFieldQuery\nboost\n\nfield\n\nvalue\n\ncouchbase\nsearch\nv1\nBooleanQuery\nboost\n\nmust\nAll queries in `must` must match (AND).\nmust_not\nNo queries in `must_not` may match.\nshould\nAt least one query in `should` should match (OR).\ncouchbase\nsearch\nv1\nConjunctionQuery\nboost\n\nqueries\n\ncouchbase\nsearch\nv1\nDateRange\nname\n\nstart\n\nend\n\ncouchbase\nsearch\nv1\nDateRangeFacet\nfield\n\nsize\n\ndate_ranges\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nDateRangeFacetResult\nfield\n\ntotal\n\nmissing\n\nother\n\ndate_ranges\n\ncouchbase\nsearch\nv1\nDateRangeQuery\nboost\n\nfield\n\ndate_time_parser\n\nstart_date\n\nend_date\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nDateRangeResult\nname\n\nsize\n\nstart\n\nend\n\ncouchbase\nsearch\nv1\nDisjunctionQuery\nboost\n\nqueries\n\nminimum\nMinimum number of child queries that must match. Default: 1.\ncouchbase\nsearch\nv1\nDocIdQuery\nboost\n\nids\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nMetaData\nErrorsEntry\nkey\n\nvalue\n\ncouchbase\nsearch\nv1\nFacet\ndate_range_facet\n\nnumeric_range_facet\n\nterm_facet\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nFacetResult\nterm_facet\n\ndate_range_facet\n\nnumeric_range_facet\n\ncouchbase\nsearch\nv1\nSearchQueryRequest\nFacetsEntry\nkey\n\nvalue\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nFacetsEntry\nkey\n\nvalue\n\ncouchbase\nsearch\nv1\nFieldSorting\nfield\n\ndescending\n\nmissing\nHow to handle documents missing this field (\"first\" or \"last\").\nmode\nSort mode for multi-valued fields (\"min\", \"max\").\ntype\nType hint for the field value (\"auto\", \"string\", \"number\", \"date\").\ncouchbase\nsearch\nv1\nSearchQueryResponse\nSearchQueryRow\nFieldsEntry\nkey\n\nvalue\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nFragment\ncontent\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nSearchQueryRow\nFragmentsEntry\nkey\n\nvalue\n\ncouchbase\nsearch\nv1\nGeoBoundingBoxQuery\nboost\n\nfield\n\ntop_left\n\nbottom_right\n\ncouchbase\nsearch\nv1\nGeoDistanceQuery\nboost\n\nfield\n\ncenter\n\ndistance\nThe maximum distance from center, with unit (e.g., \"10mi\", \"5km\").\ncouchbase\nsearch\nv1\nGeoDistanceSorting\nfield\n\ndescending\n\ncenter\n\nunit\nDistance unit (e.g., \"mi\", \"km\", \"m\").\ncouchbase\nsearch\nv1\nGeoPolygonQuery\nboost\n\nfield\n\nvertices\n\ncouchbase\nsearch\nv1\nIdSorting\ndescending\n\ncouchbase\nsearch\nv1\nKnnQuery\nfield\nThe vector index field name to search against.\nk\nNumber of nearest neighbors to return.\nvector\nThe query vector to find neighbors for.\nboost\n\ncouchbase\nsearch\nv1\nLatLng\nlatitude\n\nlongitude\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nLocation\nfield\n\nterm\n\nposition\n\nstart\nByte offset of the term start in the field value.\nend\nByte offset of the term end in the field value.\narray_positions\nArray positions if the field is an array.\ncouchbase\nsearch\nv1\nMatchAllQuery\ncouchbase\nsearch\nv1\nMatchNoneQuery\ncouchbase\nsearch\nv1\nMatchPhraseQuery\nboost\n\nfield\n\nphrase\n\nanalyzer\n\ncouchbase\nsearch\nv1\nMatchQuery\nboost\n\nfield\n\nvalue\nThe text to match against the field.\nanalyzer\n\nfuzziness\nMaximum edit distance for fuzzy matching.\noperator\n\nprefix_length\nNumber of characters at the start of the term that must match exactly.\ncouchbase\nsearch\nv1\nSearchQueryResponse\nMetaData\nmetrics\n\nerrors\nErrors from individual search partitions, keyed by partition name.\ncouchbase\nsearch\nv1\nNumericRange\nname\n\nmin\n\nmax\n\ncouchbase\nsearch\nv1\nNumericRangeFacet\nfield\n\nsize\n\nnumeric_ranges\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nNumericRangeFacetResult\nfield\n\ntotal\n\nmissing\n\nother\n\nnumeric_ranges\n\ncouchbase\nsearch\nv1\nNumericRangeQuery\nboost\n\nfield\n\nmin\n\nmax\n\ninclusive_min\nWhether the min value is inclusive (default: true).\ninclusive_max\nWhether the max value is inclusive (default: false).\ncouchbase\nsearch\nv1\nSearchQueryResponse\nNumericRangeResult\nname\n\nsize\n\nmin\n\nmax\n\ncouchbase\nsearch\nv1\nPhraseQuery\nboost\n\nfield\n\nterms\n\ncouchbase\nsearch\nv1\nPrefixQuery\nboost\n\nfield\n\nprefix\n\ncouchbase\nsearch\nv1\nQuery\nboolean_field_query\n\nboolean_query\n\nconjunction_query\n\ndate_range_query\n\ndisjunction_query\n\ndoc_id_query\n\ngeo_bounding_box_query\n\ngeo_distance_query\n\ngeo_polygon_query\n\nmatch_all_query\n\nmatch_none_query\n\nmatch_phrase_query\n\nmatch_query\n\nnumeric_range_query\n\nphrase_query\n\nprefix_query\n\nquery_string_query\n\nregexp_query\n\nterm_query\n\nterm_range_query\n\nwildcard_query\n\ncouchbase\nsearch\nv1\nQueryStringQuery\nboost\n\nquery_string\n\ncouchbase\nsearch\nv1\nRegexpQuery\nboost\n\nfield\n\nregexp\n\ncouchbase\nsearch\nv1\nScoreSorting\ndescending\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nSearchMetrics\nexecution_time\n\ntotal_rows\n\nmax_score\n\ntotal_partition_count\n\nsuccess_partition_count\n\nerror_partition_count\n\ncouchbase\nsearch\nv1\nSearchQueryRequest\nindex_name\nThe name of the search index to query.\nquery\nThe search query to execute.\nscan_consistency\n\nlimit\nMaximum number of hits to return.\nskip\nNumber of hits to skip (for pagination).\ninclude_explanation\nWhen true, include scoring explanations in each hit.\nhighlight_style\n\nhighlight_fields\nFields to apply highlighting to.\nfields\nDocument fields to include in each hit (empty = all stored fields).\nsort\nSort specifications. Applied in order.\ndisable_scoring\nWhen true, do not compute relevance scores (faster for non-scored queries).\ncollections\nRestrict the search to these collections within the index.\ninclude_locations\nWhen true, include term location data in each hit.\nfacets\nFacets to compute. Keys are facet names, values are facet specs.\nbucket_name\nOptional bucket scope for scoped indexes.\nscope_name\n\nknn\nKNN queries for vector search. Combined according to knn_operator.\nknn_operator\nHow to combine multiple KNN queries. Default: OR.\ncouchbase\nsearch\nv1\nSearchQueryResponse\nhits\nThe search hits matching the query.\nfacets\nFacet results, keyed by facet name.\nmeta_data\nMetadata about the search execution.\ncouchbase\nsearch\nv1\nSearchQueryResponse\nSearchQueryRow\nid\nThe document ID of the matching document.\nscore\nThe relevance score of this hit.\nindex\nThe index partition that produced this hit.\nexplanation\nScoring explanation, if requested. JSON-encoded.\nlocations\nTerm location data, if requested.\nfragments\nHighlighted fragments, keyed by field name.\nfields\nStored field values, keyed by field name. JSON-encoded values.\ncouchbase\nsearch\nv1\nSorting\nfield_sorting\n\ngeo_distance_sorting\n\nid_sorting\n\nscore_sorting\n\ncouchbase\nsearch\nv1\nTermFacet\nfield\n\nsize\nMaximum number of term buckets to return.\ncouchbase\nsearch\nv1\nSearchQueryResponse\nTermFacetResult\nfield\n\ntotal\n\nmissing\n\nother\n\nterms\n\ncouchbase\nsearch\nv1\nTermQuery\nboost\n\nfield\n\nterm\n\nfuzziness\n\nprefix_length\n\ncouchbase\nsearch\nv1\nTermRangeQuery\nboost\n\nfield\n\nmin\n\nmax\n\ninclusive_min\n\ninclusive_max\n\ncouchbase\nsearch\nv1\nSearchQueryResponse\nTermResult\nname\n\nfield\n\nsize\n\ncouchbase\nsearch\nv1\nWildcardQuery\nboost\n\nfield\n\nwildcard\n\ncouchbase\nsearch\nv1\nSearchQueryRequest\nHighlightStyle\nHighlightStyle controls how matching terms are highlighted in results.\nHIGHLIGHT_STYLE_DEFAULT\nServer default highlighting.\nHIGHLIGHT_STYLE_HTML\nHTML tag highlighting (<mark>).\nHIGHLIGHT_STYLE_ANSI\nANSI escape code highlighting (for terminals).\ncouchbase\nsearch\nv1\nKnnOperator\nKnnOperator controls how multiple KNN queries are combined.\nKNN_OPERATOR_OR\nResults from multiple KNN queries are combined with OR (union).\nKNN_OPERATOR_AND\nResults from multiple KNN queries are combined with AND (intersection).\ncouchbase\nsearch\nv1\nMatchQuery\nOperator\nOperator controls how multiple terms in the value are combined.\nOPERATOR_OR\nAny term may match (default).\nOPERATOR_AND\nAll terms must match.\ncouchbase\nsearch\nv1\nSearchQueryRequest\nScanConsistency\nScanConsistency for search queries.\nSCAN_CONSISTENCY_NOT_BOUNDED\nNo consistency required.\n"}, "couchbase.transactions.v1": {"package": "couchbase.transactions.v1", "url": "couchbase.transactions.v1.html", "content": "couchbase.transactions.v1\n\ncouchbase\ntransactions\nv1\nTransactionsService\nTransactionsService provides distributed ACID transactions.\n All data operations must reference a valid transaction_id and attempt_id\n obtained from TransactionBeginAttempt.\nTransactionBeginAttempt\nTransactionBeginAttempt starts a new transaction attempt. Returns\n a transaction_id and attempt_id to use for all subsequent operations.\n If transaction_id is provided, this begins a retry attempt for an\n existing transaction.\ncouchbase\ntransactions\nv1\nTransactionBeginAttemptRequest\ncouchbase\ntransactions\nv1\nTransactionBeginAttemptResponse\nTransactionCommit\nTransactionCommit commits all mutations made within the transaction\n attempt, making them visible to other operations.\ncouchbase\ntransactions\nv1\nTransactionCommitRequest\ncouchbase\ntransactions\nv1\nTransactionCommitResponse\nTransactionRollback\nTransactionRollback aborts the transaction attempt and discards\n all uncommitted mutations.\ncouchbase\ntransactions\nv1\nTransactionRollbackRequest\ncouchbase\ntransactions\nv1\nTransactionRollbackResponse\nTransactionGet\nTransactionGet retrieves a document within the transaction context.\n The returned CAS must be used for subsequent Replace or Remove\n operations on this document within the same transaction.\ncouchbase\ntransactions\nv1\nTransactionGetRequest\ncouchbase\ntransactions\nv1\nTransactionGetResponse\nTransactionInsert\nTransactionInsert creates a new document within the transaction.\n Fails if the document already exists.\ncouchbase\ntransactions\nv1\nTransactionInsertRequest\ncouchbase\ntransactions\nv1\nTransactionInsertResponse\nTransactionReplace\nTransactionReplace replaces an existing document within the transaction.\n Requires the CAS from a prior TransactionGet.\ncouchbase\ntransactions\nv1\nTransactionReplaceRequest\ncouchbase\ntransactions\nv1\nTransactionReplaceResponse\nTransactionRemove\nTransactionRemove removes a document within the transaction.\n Requires the CAS from a prior TransactionGet.\ncouchbase\ntransactions\nv1\nTransactionRemoveRequest\ncouchbase\ntransactions\nv1\nTransactionRemoveResponse\ncouchbase\ntransactions\nv1\nTransactionBeginAttemptRequest\nbucket_name\nThe bucket to use for transaction metadata storage.\ntransaction_id\nOptional. When provided, this begins a retry attempt for an existing\n transaction rather than starting a brand-new transaction.\ncouchbase\ntransactions\nv1\nTransactionBeginAttemptResponse\ntransaction_id\nThe unique identifier for this transaction.\nattempt_id\nThe unique identifier for this specific attempt within the transaction.\ncouchbase\ntransactions\nv1\nTransactionCommitRequest\nbucket_name\n\ntransaction_id\n\nattempt_id\n\ncouchbase\ntransactions\nv1\nTransactionCommitResponse\ncouchbase\ntransactions\nv1\nTransactionGetRequest\nbucket_name\n\ntransaction_id\ntransaction_id and attempt_id are optional to allow read-only transactions.\n clients are not permitted to use this functionality to optimize\n non-read-only transactions.\nattempt_id\n\nscope_name\n\ncollection_name\n\nkey\n\ncouchbase\ntransactions\nv1\nTransactionGetResponse\ncas\nThe CAS value, required for subsequent Replace or Remove operations.\nvalue\nThe document body as raw bytes.\ncouchbase\ntransactions\nv1\nTransactionInsertRequest\nbucket_name\n\ntransaction_id\n\nattempt_id\n\nscope_name\n\ncollection_name\n\nkey\n\nvalue\nThe document body to store.\ncouchbase\ntransactions\nv1\nTransactionInsertResponse\ncas\n\ncouchbase\ntransactions\nv1\nTransactionRemoveRequest\nbucket_name\n\ntransaction_id\n\nattempt_id\n\nscope_name\n\ncollection_name\n\nkey\n\ncas\nThe CAS from a prior TransactionGet. Required for concurrency control.\ncouchbase\ntransactions\nv1\nTransactionRemoveResponse\ncas\n\ncouchbase\ntransactions\nv1\nTransactionReplaceRequest\nbucket_name\n\ntransaction_id\n\nattempt_id\n\nscope_name\n\ncollection_name\n\nkey\n\ncas\nThe CAS from a prior TransactionGet. Required for concurrency control.\nvalue\nThe new document body.\ncouchbase\ntransactions\nv1\nTransactionReplaceResponse\ncas\n\ncouchbase\ntransactions\nv1\nTransactionRollbackRequest\nbucket_name\n\ntransaction_id\n\nattempt_id\n\ncouchbase\ntransactions\nv1\nTransactionRollbackResponse\n"}, "couchbase.view.v1": {"package": "couchbase.view.v1", "url": "couchbase.view.v1.html", "content": "couchbase.view.v1\n\ncouchbase\nview\nv1\nViewService\nViewService provides MapReduce view query execution.\nViewQuery\nViewQuery executes a MapReduce view query and streams back result rows\n and metadata. The final streamed response contains MetaData.\ncouchbase\nview\nv1\nViewQueryRequest\ncouchbase\nview\nv1\nViewQueryResponse\ncouchbase\nview\nv1\nViewQueryResponse\nMetaData\ntotal_rows\nTotal number of rows in the view (before skip/limit are applied).\ndebug\nDebug information, if requested. JSON-encoded.\ncouchbase\nview\nv1\nViewQueryResponse\nRow\nid\nThe document ID that produced this row.\nkey\nThe emitted key from the map function. JSON-encoded.\nvalue\nThe emitted value from the map function (or reduce result). JSON-encoded.\ncouchbase\nview\nv1\nViewQueryRequest\ndesign_document_name\nThe name of the design document (without the '_design/' prefix).\nview_name\nThe name of the view within the design document.\nskip\nNumber of initial rows to skip before returning results.\nlimit\nMaximum number of rows to return.\nscan_consistency\n\nreduce\nWhen true, execute the view's reduce function on the results.\ngroup\nWhen true, group reduce results by their keys.\nbucket_name\nThe bucket containing the design document.\ngroup_level\nThe number of key components to group by (used with group=true).\nkey\nFetch only the row with this exact key. JSON-encoded.\nkeys\nFetch only the rows with these exact keys. Each is JSON-encoded.\nstart_key\nStart of the key range (inclusive). JSON-encoded.\nend_key\nEnd of the key range. JSON-encoded. Inclusiveness controlled by\n inclusive_end.\ninclusive_end\nWhen true, the end_key is inclusive (default: true).\nstart_key_doc_id\nStart returning results from this document ID within the start_key.\nend_key_doc_id\nStop returning results at this document ID within the end_key.\non_error\n\ndebug\nWhen true, include debug information in the response metadata.\nnamespace\n\norder\n\ncouchbase\nview\nv1\nViewQueryResponse\nrows\nThe result rows from the view query.\nmeta_data\n\ncouchbase\nview\nv1\nViewQueryRequest\nErrorMode\nErrorMode controls behavior when errors occur during view execution.\nERROR_MODE_CONTINUE\nContinue processing remaining results even if errors occur.\nERROR_MODE_STOP\nStop processing immediately on the first error.\ncouchbase\nview\nv1\nViewQueryRequest\nNamespace\nNamespace selects whether to query production or development views.\nNAMESPACE_PRODUCTION\nQuery production design documents.\nNAMESPACE_DEVELOPMENT\nQuery development design documents (prefixed with 'dev_').\ncouchbase\nview\nv1\nViewQueryRequest\nOrder\nOrder controls the sort order of results.\nORDER_ASCENDING\nReturn results in ascending key order (default).\nORDER_DESCENDING\nReturn results in descending key order.\ncouchbase\nview\nv1\nViewQueryRequest\nScanConsistency\nScanConsistency controls index freshness for the view query.\nSCAN_CONSISTENCY_NOT_BOUNDED\nNo consistency required \u2014 fastest, may return stale results.\nSCAN_CONSISTENCY_REQUEST_PLUS\nWait for all prior mutations to be indexed.\nSCAN_CONSISTENCY_UPDATE_AFTER\nReturn current results but trigger an index update after the query.\n"}};

    function displaySearchResults() {
        const query = new URLSearchParams(window.location.search).get('query');

        if (query) {
            document.getElementById('mainInputQuery').value = query;

              words = query.toLowerCase().split(" "); // toLowerCase() is needed to make the search case insensitive.
